name: KeepMirror

options:
  createIntermediateGroups: true
  defaultConfig: Debug
  deploymentTarget:
    macOS: "13.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    # Explicitly off globally so no target accidentally auto-generates a plist.
    GENERATE_INFOPLIST_FILE: NO

targets:
  KeepMirror:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      # ── App entry ────────────────────────────────────────────────────────
      - path: KeepMirror/App/main.swift
      - path: KeepMirror/App/AppDelegate.swift
      - path: KeepMirror/App/AppEnvironment.swift
      - path: KeepMirror/App/MirrorController.swift
      # ── Models ───────────────────────────────────────────────────────────
      - path: KeepMirror/Models/MirrorSettings.swift
      # ── Services ─────────────────────────────────────────────────────────
      - path: KeepMirror/Services/CameraManager.swift
      - path: KeepMirror/Services/NotchHoverMonitor.swift
      - path: KeepMirror/Services/LaunchAtLoginManager.swift
      - path: KeepMirror/Services/LinkOpening.swift
      - path: KeepMirror/Services/SettingsStore.swift
      - path: KeepMirror/Services/SettingsWindowManager.swift
      - path: KeepMirror/Services/StatusItemController.swift
      - path: KeepMirror/Services/StandaloneMicMonitor.swift
      - path: KeepMirror/Services/GlobalHotkeyManager.swift
      # ── Views ────────────────────────────────────────────────────────────
      - path: KeepMirror/Views/MirrorPopoverView.swift
      - path: KeepMirror/Views/NotchPanelController.swift
      - path: KeepMirror/Views/MirrorSettingsTabView.swift
      - path: KeepMirror/Views/HotkeyRecorderRow.swift
      - path: KeepMirror/Views/SettingsWindowView.swift
      - path: KeepMirror/Views/AboutTabView.swift
      - path: KeepMirror/Views/KeepMirrorBranding.swift
      # ── Support ──────────────────────────────────────────────────────────
      - path: KeepMirror/Support/AppTab.swift
      - path: KeepMirror/Support/ExternalLinks.swift
      # ── Resources (bundled assets, sounds, images) ────────────────────
      - path: KeepMirror/Resources/Assets.xcassets
        buildPhase: resources
      - path: KeepMirror/Resources/profile.png
        buildPhase: resources
      - path: KeepMirror/Resources/KeepMirror.icns
        buildPhase: resources
      - path: KeepMirror/Resources/brand-mark.png
        buildPhase: resources
      - path: KeepMirror/Resources/shutter.wav
        buildPhase: resources

    settings:
      base:
        # Use our handcrafted Info.plist which has NSCamera/NSMicrophone usage strings.
        # Do NOT use info: in XcodeGen — it generates a fresh plist that strips unknown keys.
        INFOPLIST_FILE: KeepMirror/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepmirror
        PRODUCT_NAME: KeepMirror
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: KeepMirror/KeepMirror.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: KeepMirrorHelper
    postBuildScripts:
      - name: Embed Helper
        script: |
          set -euo pipefail
          DEST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Helpers"
          mkdir -p "$DEST"
          cp "$BUILT_PRODUCTS_DIR/KeepMirrorHelper" "$DEST/KeepMirrorHelper"
          chmod +x "$DEST/KeepMirrorHelper"
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/KeepMirrorHelper

  KeepMirrorHelper:
    type: tool
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: KeepMirrorHelper/main.swift
    settings:
      base:
        OTHER_SWIFT_FLAGS: -parse-as-library
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepmirror.helper
        PRODUCT_NAME: KeepMirrorHelper
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: KeepMirrorHelper/KeepMirrorHelper.entitlements
        CODE_SIGN_STYLE: Automatic

  KeepMirrorTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: KeepMirrorTests/MirrorSettingsTests.swift
      - path: KeepMirror/Models/MirrorSettings.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepmirror.tests

  KeepMirrorUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: KeepMirrorUITests/KeepMirrorUITests.swift
    dependencies:
      - target: KeepMirror
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepmirror.uitests

schemes:
  KeepMirror:
    build:
      targets:
        KeepMirror: all
        KeepMirrorHelper: run
    test:
      gatherCoverageData: true
      targets:
        - name: KeepMirrorTests
        - name: KeepMirrorUITests
