name: KeepMirror

options:
  createIntermediateGroups: true
  defaultConfig: Debug
  deploymentTarget:
    macOS: "13.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: NO
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  KeepMirror:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: KeepMirror/App/main.swift
      - path: KeepMirror/App/AppDelegate.swift
      - path: KeepMirror/App/AppEnvironment.swift
      - path: KeepMirror/App/KeepMirrorController.swift
      - path: KeepMirror/Models/ActivationDuration.swift
      - path: KeepMirror/Models/ActivationSession.swift
      - path: KeepMirror/Models/AppSettings.swift
      - path: KeepMirror/Models/PowerSnapshot.swift
      - path: KeepMirror/Services/ActivationSessionController.swift
      - path: KeepMirror/Services/BatteryMonitor.swift
      - path: KeepMirror/Services/FocusDetectionService.swift
      - path: KeepMirror/Services/LaunchAtLoginManager.swift
      - path: KeepMirror/Services/LinkOpening.swift
      - path: KeepMirror/Services/NotificationManager.swift
      - path: KeepMirror/Services/PowerStatusProviding.swift
      - path: KeepMirror/Services/SettingsWindowManager.swift
      - path: KeepMirror/Services/StatusItemController.swift
      - path: KeepMirror/Services/WakeAssertionController.swift
      - path: KeepMirror/Views/AboutTabView.swift
      - path: KeepMirror/Views/ActivationDurationTabView.swift
      - path: KeepMirror/Views/AddDurationSheet.swift
      - path: KeepMirror/Views/KeepMirrorBranding.swift
      - path: KeepMirror/Views/OnboardingView.swift
      - path: KeepMirror/Views/QuickActionsMenuView.swift
      - path: KeepMirror/Views/SettingsTabView.swift
      - path: KeepMirror/Views/SettingsWindowView.swift
      - path: KeepMirror/Support/AppTab.swift
      - path: KeepMirror/Support/ExternalLinks.swift
    resources:
      - path: KeepMirror/Resources/profile.png
      - path: KeepMirror/Resources/KeepMirror.icns
      - path: KeepMirror/Resources/brand-mark.png
      - path: KeepMirror/Resources/Assets.xcassets
    info:
      path: KeepMirror/Info.plist
    settings:
      base:
        INFOPLIST_KEY_CFBundleIconFile: KeepMirror.icns
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepmirror
        PRODUCT_NAME: KeepMirror
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: KeepMirror/KeepMirror.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: KeepMirrorHelper
    postBuildScripts:
      - name: Copy App Resources
        script: |
          set -euo pipefail
          DEST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Resources"
          PLIST="$TARGET_BUILD_DIR/$INFOPLIST_PATH"
          mkdir -p "$DEST"
          cp "$SRCROOT/KeepMirror/Resources/profile.png" "$DEST/profile.png"
          cp "$SRCROOT/KeepMirror/Resources/KeepMirror.icns" "$DEST/KeepMirror.icns"
          cp "$SRCROOT/KeepMirror/Resources/brand-mark.png" "$DEST/brand-mark.png"
          if /usr/libexec/PlistBuddy -c "Print :CFBundleIconFile" "$PLIST" >/dev/null 2>&1; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile KeepMirror.icns" "$PLIST"
          else
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string KeepMirror.icns" "$PLIST"
          fi
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/profile.png
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/KeepMirror.icns
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/brand-mark.png
      - name: Embed Helper
        script: |
          set -euo pipefail
          DEST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Helpers"
          mkdir -p "$DEST"
          cp "$BUILT_PRODUCTS_DIR/KeepMirrorHelper" "$DEST/KeepMirrorHelper"
          chmod +x "$DEST/KeepMirrorHelper"
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/KeepMirrorHelper

  KeepMirrorHelper:
    type: tool
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: KeepMirrorHelper/main.swift
    settings:
      base:
        OTHER_SWIFT_FLAGS: -parse-as-library
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepmirror.helper
        PRODUCT_NAME: KeepMirrorHelper
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: KeepMirrorHelper/KeepMirrorHelper.entitlements
        CODE_SIGN_STYLE: Automatic

  KeepMirrorTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: KeepMirrorTests/ActivationDurationTests.swift
      - path: KeepMirrorTests/ActivationSessionControllerTests.swift
      - path: KeepMirrorTests/AppSettingsTests.swift
      - path: KeepMirrorTests/KeepMirrorControllerTests.swift
    dependencies:
      - target: KeepMirror
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepmirror.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/KeepMirror.app/Contents/MacOS/KeepMirror"
        BUNDLE_LOADER: "$(TEST_HOST)"

  KeepMirrorUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: KeepMirrorUITests/KeepMirrorUITests.swift
    dependencies:
      - target: KeepMirror
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepmirror.uitests

schemes:
  KeepMirror:
    build:
      targets:
        KeepMirror: all
        KeepMirrorHelper: run
    test:
      gatherCoverageData: true
      targets:
        - name: KeepMirrorTests
        - name: KeepMirrorUITests
