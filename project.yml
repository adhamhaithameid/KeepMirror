name: KeepAwake

options:
  createIntermediateGroups: true
  defaultConfig: Debug
  deploymentTarget:
    macOS: "13.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: NO
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  KeepAwake:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: KeepAwake/App/main.swift
      - path: KeepAwake/App/AppDelegate.swift
      - path: KeepAwake/App/AppEnvironment.swift
      - path: KeepAwake/App/KeepAwakeController.swift
      - path: KeepAwake/Models/ActivationDuration.swift
      - path: KeepAwake/Models/ActivationSession.swift
      - path: KeepAwake/Models/AppSettings.swift
      - path: KeepAwake/Models/PowerSnapshot.swift
      - path: KeepAwake/Services/ActivationSessionController.swift
      - path: KeepAwake/Services/BatteryMonitor.swift
      - path: KeepAwake/Services/FocusDetectionService.swift
      - path: KeepAwake/Services/LaunchAtLoginManager.swift
      - path: KeepAwake/Services/LinkOpening.swift
      - path: KeepAwake/Services/NotificationManager.swift
      - path: KeepAwake/Services/PowerStatusProviding.swift
      - path: KeepAwake/Services/SettingsWindowManager.swift
      - path: KeepAwake/Services/StatusItemController.swift
      - path: KeepAwake/Services/WakeAssertionController.swift
      - path: KeepAwake/Views/AboutTabView.swift
      - path: KeepAwake/Views/ActivationDurationTabView.swift
      - path: KeepAwake/Views/AddDurationSheet.swift
      - path: KeepAwake/Views/KeepAwakeBranding.swift
      - path: KeepAwake/Views/OnboardingView.swift
      - path: KeepAwake/Views/QuickActionsMenuView.swift
      - path: KeepAwake/Views/SettingsTabView.swift
      - path: KeepAwake/Views/SettingsWindowView.swift
      - path: KeepAwake/Support/AppTab.swift
      - path: KeepAwake/Support/ExternalLinks.swift
    resources:
      - path: KeepAwake/Resources/profile.png
      - path: KeepAwake/Resources/KeepAwake.icns
      - path: KeepAwake/Resources/brand-mark.png
      - path: KeepAwake/Resources/Assets.xcassets
    info:
      path: KeepAwake/Info.plist
    settings:
      base:
        INFOPLIST_KEY_CFBundleIconFile: KeepAwake.icns
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepawake
        PRODUCT_NAME: KeepAwake
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: KeepAwake/KeepAwake.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: KeepAwakeHelper
    postBuildScripts:
      - name: Copy App Resources
        script: |
          set -euo pipefail
          DEST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Resources"
          PLIST="$TARGET_BUILD_DIR/$INFOPLIST_PATH"
          mkdir -p "$DEST"
          cp "$SRCROOT/KeepAwake/Resources/profile.png" "$DEST/profile.png"
          cp "$SRCROOT/KeepAwake/Resources/KeepAwake.icns" "$DEST/KeepAwake.icns"
          cp "$SRCROOT/KeepAwake/Resources/brand-mark.png" "$DEST/brand-mark.png"
          if /usr/libexec/PlistBuddy -c "Print :CFBundleIconFile" "$PLIST" >/dev/null 2>&1; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile KeepAwake.icns" "$PLIST"
          else
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string KeepAwake.icns" "$PLIST"
          fi
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/profile.png
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/KeepAwake.icns
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/brand-mark.png
      - name: Embed Helper
        script: |
          set -euo pipefail
          DEST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Helpers"
          mkdir -p "$DEST"
          cp "$BUILT_PRODUCTS_DIR/KeepAwakeHelper" "$DEST/KeepAwakeHelper"
          chmod +x "$DEST/KeepAwakeHelper"
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/KeepAwakeHelper

  KeepAwakeHelper:
    type: tool
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: KeepAwakeHelper/main.swift
    settings:
      base:
        OTHER_SWIFT_FLAGS: -parse-as-library
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepawake.helper
        PRODUCT_NAME: KeepAwakeHelper
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: KeepAwakeHelper/KeepAwakeHelper.entitlements
        CODE_SIGN_STYLE: Automatic

  KeepAwakeTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: KeepAwakeTests/ActivationDurationTests.swift
      - path: KeepAwakeTests/ActivationSessionControllerTests.swift
      - path: KeepAwakeTests/AppSettingsTests.swift
      - path: KeepAwakeTests/KeepAwakeControllerTests.swift
    dependencies:
      - target: KeepAwake
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepawake.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/KeepAwake.app/Contents/MacOS/KeepAwake"
        BUNDLE_LOADER: "$(TEST_HOST)"

  KeepAwakeUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: KeepAwakeUITests/KeepAwakeUITests.swift
    dependencies:
      - target: KeepAwake
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepawake.uitests

schemes:
  KeepAwake:
    build:
      targets:
        KeepAwake: all
        KeepAwakeHelper: run
    test:
      gatherCoverageData: true
      targets:
        - name: KeepAwakeTests
        - name: KeepAwakeUITests
